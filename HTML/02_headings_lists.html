<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lists</title>
</head>
<body>
    <h1>Lorem, ipsum dolor.</h1>
    <h2>Lorem ipsum dolor sit.</h2>

    <ul>
        <li>orange tea</li>
        <li>black tea</li>
        <li>green tea</li>
    </ul>

    <ol>
        <li>orange tea</li>
        <li>black tea</li>
        <li>green tea</li>
    </ol>

    <img src="./images/kratos 2.jpg" alt="kratos" width="200">

    <div>
        <h1>Block Level Elements</h1>
        <ul>
            <li>headings</li>
            <li>ol ul</li>
            <li>p</li>
        </ul>
    </div>

    <div>
        <h1>Inline Elements</h1>
        <ul>
            <li>a tags</li>
            <li>img </li>
            <li>strong</li>
            <li>em</li>
        </ul>
    </div>

    <p>Lorem ipsum <em>italic</em> dolor sit amet. <strong>bold</strong></p>

</body>
</html>
